  <!-- FULLSCREEN LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lb-inner">
      <div class="lb-top">
        <div class="lb-title" id="lb-title">Image</div>
        <button class="lb-btn-sk" id="lb-close" type="button" aria-label="Close">Close</button>
      </div>
      <div class="lb-stage" id="lb-stage">
        <button class="lb-arrow left" id="lb-prev" type="button" aria-label="Previous">&#8592;</button>
        <img class="lb-img" id="lb-img" alt="Sketchbook image" />
        <button class="lb-arrow right" id="lb-next" type="button" aria-label="Next">&#8594;</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    /* Build image list from source — last item = newest = index 0 after reverse */
    const sourceImgs = Array.from(document.querySelectorAll('#img-source img'));
    const images = sourceImgs.slice().reverse().map(img => ({
      src: img.getAttribute('src'),
      alt: img.getAttribute('alt') || 'Sketchbook image'
    }));

    /* Render thumbnail grid (newest first) */
    const thumbGrid = document.getElementById('thumb-grid');
    images.forEach(function(img, i){
      const el = document.createElement('img');
      el.src = img.src;
      el.alt = img.alt;
      el.dataset.index = String(i);
      el.loading = 'lazy';
      thumbGrid.appendChild(el);
    });

    /* Study grid lightbox (reuse same lb) */
    const studyImgs = Array.from(document.querySelectorAll('#studyGrid img'));

    /* Lightbox */
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title');
    const lbStage = document.getElementById('lb-stage');
    const btnClose = document.getElementById('lb-close');
    const btnPrev  = document.getElementById('lb-prev');
    const btnNext  = document.getElementById('lb-next');

    let pool    = images;  /* active pool (main or study) */
    let current = 0;

    function show(index){
      if(!pool.length) return;
      current = (index + pool.length) % pool.length;
      lbImg.src = pool[current].src;
      lbImg.alt = pool[current].alt;
      lbTitle.textContent = pool[current].alt + '  (' + (current + 1) + ' / ' + pool.length + ')';
    }

    function openLB(index, activePool){
      pool = activePool;
      show(index);
      lb.classList.add('open');
      lb.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    }

    function closeLB(){
      lb.classList.remove('open');
      lb.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
    }

    /* Main thumbnail grid */
    thumbGrid.addEventListener('click', function(e){
      const t = e.target.closest('img');
      if(!t) return;
      openLB(parseInt(t.dataset.index, 10) || 0, images);
    });

    /* 30-second study grid */
    const studyPool = studyImgs.map(function(el){
      return { src: el.getAttribute('src'), alt: el.getAttribute('alt') || 'Study' };
    });
    studyImgs.forEach(function(el, i){
      el.style.cursor = 'pointer';
      el.addEventListener('click', function(){ openLB(i, studyPool); });
    });

    btnClose.addEventListener('click', closeLB);
    btnPrev.addEventListener('click', function(){ show(current - 1); });
    btnNext.addEventListener('click', function(){ show(current + 1); });

    lb.addEventListener('click', function(e){
      if(e.target === lb || e.target === lbStage) closeLB();
    });

    document.addEventListener('keydown', function(e){
      if(!lb.classList.contains('open')) return;
      if(e.key === 'Escape') closeLB();
      if(e.key === 'ArrowLeft') show(current - 1);
      if(e.key === 'ArrowRight') show(current + 1);
    });

    let startX = 0;
    lbStage.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; }, {passive:true});
    lbStage.addEventListener('touchend', function(e){
      const dx = e.changedTouches[0].clientX - startX;
      if(Math.abs(dx) < 50) return;
      if(dx > 0) show(current - 1); else show(current + 1);
    }, {passive:true});
  </script>
