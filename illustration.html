<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MB | Illustration</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23121212'/%3E%3Ctext x='50' y='70' font-family='serif' font-size='45' font-weight='700' text-anchor='middle' fill='%23ff6f61'%3EMB%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root { --bg:#121212; --ink:#f5f5f5; --ink-d:#cfcfcf; --accent:#ff6f61; }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family:Montserrat,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      line-height:1.6;
    }
    a{ color:inherit; text-decoration:none; }

    /* Simple sticky header */
    header{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background:rgba(18,18,18,.9);
      border-bottom:1px solid #222;
    }
    .wrap{ max-width:1160px; margin:0 auto; padding:1rem 1.25rem; }
    .nav{ display:flex; align-items:center; justify-content:space-between; }
    .logo{
      font-family:'Playfair Display',serif;
      font-weight:700;
      font-size:1.5rem;
      letter-spacing:.5px;
    }
    .back{
      color:var(--ink-d);
      font-size:.95rem;
    }
    .back:hover{ color:var(--accent); }

    /* Banner + title (optional, minimal) */
    .banner{
      max-width:1160px;
      margin:1.5rem auto 1rem;
      padding:0 1.25rem;
    }
    .banner-box{
      height:220px;
      border-radius:16px;
      overflow:hidden;
      background:#0c0c0c;
      border:1px solid #232323;
      position:relative;
    }
    .banner-box img{
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.55;
      display:block;
    }
    .banner-box::after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(18,18,18,.25), rgba(18,18,18,.65));
    }
    .banner-text{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:1.25rem 1.25rem 1.1rem;
      z-index:1;
    }
    .banner-text h1{
      margin:0;
      font-family:'Playfair Display',serif;
      font-size:clamp(2rem,4vw,2.6rem);
      color:var(--ink);
    }
    .banner-text p{
      margin:.25rem 0 0;
      color:var(--ink-d);
      max-width:760px;
    }

    main{ padding:1.25rem 1.25rem 4rem; }
    .grid{
      max-width:1160px;
      margin:0 auto;
      display:grid;
      gap:1rem;
      grid-template-columns:repeat(3, 1fr);
    }
    @media (max-width:900px){ .grid{ grid-template-columns:repeat(2,1fr); } }
    @media (max-width:600px){ .grid{ grid-template-columns:1fr; } }

    /* Art only: images are just images */
    .grid img{
      width:100%;
      height:auto;
      display:block;
      border-radius:12px;
      border:1px solid #232323;
      background:#0c0c0c;
      cursor:pointer;
    }

    /* Lightbox */
    .lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.86);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:2rem 1.25rem;
    }
    .lightbox.open{ display:flex; }

    .lightbox img{
      max-width:min(1100px, 96vw);
      max-height:86vh;
      width:auto;
      height:auto;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#0c0c0c;
    }

    .lb-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      border:none;
      background:rgba(0,0,0,.55);
      color:#fff;
      font-size:1.4rem;
      padding:.6rem .9rem;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
    }
    .lb-btn:hover{ background:rgba(0,0,0,.85); }
    .lb-prev{ left:1rem; }
    .lb-next{ right:1rem; }

    .lb-close{
      position:absolute;
      top:1rem;
      right:1rem;
      border:none;
      background:rgba(0,0,0,.55);
      color:#fff;
      font-size:1.2rem;
      padding:.55rem .8rem;
      border-radius:999px;
      cursor:pointer;
    }
    .lb-close:hover{ background:rgba(0,0,0,.85); }

    footer{
      padding:2rem 1rem;
      text-align:center;
      color:#9a9a9a;
      border-top:1px solid #202020;
      font-size:.85rem;
    }

    @media (prefers-reduced-motion: reduce){
      *{scroll-behavior:auto !important; transition:none !important; animation:none !important;}
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap nav" role="navigation" aria-label="Primary">
      <a class="logo" href="index.html" aria-label="Back to portfolio home">MB</a>
      <a class="back" href="index.html#work">Back to Work</a>
    </div>
  </header>

  <!-- OPTIONAL BANNER: swap image path or delete this whole .banner block if you want even less -->
  <div class="banner">
    <div class="banner-box">
      <img src="Images and Videos/PortBanner2025.png" alt="" aria-hidden="true">
      <div class="banner-text">
        <h1>Illustration</h1>
        <p>Just the work. Click any image to view it larger.</p>
      </div>
    </div>
  </div>

  <main>
    <div class="grid" id="artGrid">
      <!-- NEWEST FIRST: paste new images above older ones -->

      <img src="Images and Videos/Illustration/01.png" alt="Illustration 01" loading="lazy">
      <img src="Images and Videos/Illustration/02.png" alt="Illustration 02" loading="lazy">
      <img src="Images and Videos/Illustration/03.png" alt="Illustration 03" loading="lazy">
      <img src="Images and Videos/Illustration/04.png" alt="Illustration 04" loading="lazy">

    </div>
  </main>

  <footer>
    © <span id="year"></span> Mackenzie Burt
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">←</button>
    <img id="lbImage" alt="">
    <button class="lb-btn lb-next" id="lbNext" aria-label="Next">→</button>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const imgs = Array.from(document.querySelectorAll('#artGrid img'));
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    const lbClose = document.getElementById('lbClose');

    let current = 0;

    function openLB(index){
      current = index;
      const img = imgs[current];
      lbImage.src = img.src;
      lbImage.alt = img.alt || 'Artwork';
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLB(){
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prev(){
      current = (current - 1 + imgs.length) % imgs.length;
      openLB(current);
    }

    function next(){
      current = (current + 1) % imgs.length;
      openLB(current);
    }

    imgs.forEach((img, i) => {
      img.addEventListener('click', () => openLB(i));
    });

    lbPrev.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
    lbNext.addEventListener('click', (e) => { e.stopPropagation(); next(); });
    lbClose.addEventListener('click', (e) => { e.stopPropagation(); closeLB(); });

    // Click outside image closes
    lightbox.addEventListener('click', (e) => {
      if(e.target === lightbox) closeLB();
    });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if(!lightbox.classList.contains('open')) return;
      if(e.key === 'Escape') closeLB();
      if(e.key === 'ArrowLeft') prev();
      if(e.key === 'ArrowRight') next();
    });
  </script>
</body>
</html>
